; ============================================================
; ESP32 LED CONTROL SYSTEM
; Projeto: esp322apagarrr
; Build configuration (produção + debug estruturado)
; ============================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; ------------------------------------------------------------
; Upload / Monitor
; ------------------------------------------------------------
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; ------------------------------------------------------------
; Bibliotecas externas
; ------------------------------------------------------------
lib_deps =
    adafruit/Adafruit NeoPixel@^1.11.0
    links2004/WebSockets@^2.4.0
    bblanchon/ArduinoJson@^6.21.0

; ------------------------------------------------------------
; Dependency Finder (essencial para projetos modulares)
; deep+ evita falhas quando headers se referenciam indiretamente
; ------------------------------------------------------------
lib_ldf_mode = deep+

; ------------------------------------------------------------
; Flags globais de compilação (DEBUG + PERFORMANCE)
; ------------------------------------------------------------
build_unflags = -Os

build_flags =
    -std=gnu++17
    -O2
    -DCORE_DEBUG_LEVEL=3
    -DLOG_LOCAL_LEVEL=ESP_LOG_DEBUG
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1

; ------------------------------------------------------------
; Filesystem (para pasta /data)
; ------------------------------------------------------------
board_build.filesystem = littlefs

; Define partição com espaço real para filesystem
board_build.partitions = default.csv

; ------------------------------------------------------------
; NÃO usar build_src_filter
; O PlatformIO já compila automaticamente tudo dentro de /src
; ------------------------------------------------------------